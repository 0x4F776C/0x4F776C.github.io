<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatPlayground</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.2.31/vue.global.prod.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.24.0/axios.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        #app {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #f8f8f8;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 3px;
        }
        .category-tag {
            background-color: #007bff;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8em;
        }
        .steps {
            margin-top: 10px;
        }
        .steps h4 {
            margin-bottom: 5px;
        }
        .steps ol {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>ThreatPlayground</h1>
        <input type="text" v-model="searchQuery" @input="searchExploits" placeholder="Search for exploits...">
        <select v-model="selectedCategory" @change="searchExploits">
            <option value="">All Categories</option>
            <option v-for="category in categories" :value="category">{{ category }}</option>
        </select>
        <ul>
            <li v-for="exploit in exploits" :key="exploit.id">
                <h3>{{ exploit.name }} <span class="category-tag">{{ exploit.category }}</span></h3>
                <p>{{ exploit.description }}</p>
                <div class="steps">
                    <h4>Exploitation Steps:</h4>
                    <ol>
                        <li v-for="step in exploit.steps">{{ step }}</li>
                    </ol>
                </div>
            </li>
        </ul>
    </div>

    <script>
        const { createApp, ref, computed } = Vue

        createApp({
            setup() {
                const searchQuery = ref('')
                const exploits = ref([])
                const selectedCategory = ref('')

                const categories = computed(() => {
                    const categorySet = new Set(exploits.value.map(e => e.category))
                    return Array.from(categorySet)
                })

                const searchExploits = async () => {
                    if (searchQuery.value.length < 3 && !selectedCategory.value) return
                    try {
                        const response = await axios.get(`https://api.github.com/repos/0x4F776C/0x4F776C.github.io/contents/exploits.json`)
                        const content = atob(response.data.content)
                        const allExploits = JSON.parse(content)
                        exploits.value = allExploits.filter(exploit => 
                            (exploit.name.toLowerCase().includes(searchQuery.value.toLowerCase()) ||
                            exploit.description.toLowerCase().includes(searchQuery.value.toLowerCase())) &&
                            (selectedCategory.value === '' || exploit.category === selectedCategory.value)
                        )
                    } catch (error) {
                        console.error('Error fetching exploits:', error)
                    }
                }

                return {
                    searchQuery,
                    exploits,
                    searchExploits,
                    categories,
                    selectedCategory
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
