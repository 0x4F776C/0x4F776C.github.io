<div id="app" class="container">
    <div>
        <h1>ThreatPlayground</h1>
        <a href="https://github.com/0x4F776C" target="_blank">GitHub</a>
        <a href="https://www.linkedin.com/in/lee-chun-hao" target="_blank">LinkedIn</a>
        <button id="matrixToggle">Toggle Matrix</button>
    </div>

    <div class="search-container">
        <div class="search-input-wrapper">
            <input v-model="searchQuery" @input="searchMalware" placeholder="Search malware...">
            <button @click="clearSearch" v-if="searchQuery">×</button>
        </div>
        <div class="category-filter">
            <button @click="selectedCategory = ''" :class="{ active: selectedCategory === '' }">All Categories</button>
            <button v-for="category in categories" :key="category.name" @click="selectedCategory = category.name" :class="{ active: selectedCategory === category.name }">
                {{ category.name }} ({{ category.count }})
            </button>
        </div>
    </div>

    <p v-if="errorMessage">{{ errorMessage }}</p>

    <div class="malware-item" v-for="mal in visibleMalware" :key="mal.id" @click="openModal(mal)">
        <h3>{{ mal.name }}</h3>
        <span class="category-tag">{{ mal.category }}</span>
        <p>{{ mal.description }}</p>
    </div>

    <div class="modal" v-if="selectedMalware" @click="closeModal">
        <div class="modal-content" @click.stop="">
            <span class="close" @click="closeModal">×</span>
            <h2>{{ selectedMalware.name }}</h2>
            <p><strong>Category:</strong> {{ selectedMalware.category }}</p>
            <p><strong>Description:</strong> {{ selectedMalware.description }}</p>
            <div v-if="selectedMalware.references && selectedMalware.references.length > 0">
                <h3>References:</h3>
                <ul>
                    <li v-for="ref in selectedMalware.references" :key="ref">
                        <a :href="ref" target="_blank" rel="noopener noreferrer">{{ ref }}</a>
                    </li>
                </ul>
            </div>
            <div v-for="file in selectedMalware.files" :key="file.name">
                <h3>{{ file.name }}</h3>
                <div class="code-block">
                    <pre><code :class="getLanguage(file.name)">{{ file.content }}</code></pre>
                </div>
            </div>
        </div>
    </div>

    <button id="backToTop">↑</button>
</div>
